<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Exuno · UNPUSDT Control Panel</title>
<style>
:root{
  --bg0:#060912; --bg1:#0a1020; --card:rgba(20,27,48,.55); --cardhi:rgba(120,150,220,.14);
  --txt:#eaf0fb; --mut:#8a97ba; --dim:#5d6a8c;
  --buy:#28e0a4; --buy2:#7bffd0; --sell:#ff5d78; --sell2:#ff9bad;
  --acc:#5b8cff; --acc2:#9db8ff; --gold:#ffcf5b; --violet:#b06bff;
  --ok:#28e0a4;
  --r:20px; --shadow:0 24px 60px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;color:var(--txt);
  background:var(--bg0);min-height:100%;overflow-x:hidden;position:relative;
  -webkit-font-smoothing:antialiased;
}
/* ---- animated aurora background ---- */
.aurora{position:fixed;inset:0;z-index:-2;overflow:hidden;filter:blur(70px);opacity:.75}
.aurora span{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 22s ease-in-out infinite}
.aurora .a{width:52vw;height:52vw;left:-8vw;top:-14vw;background:radial-gradient(circle,#1b3bff,transparent 62%)}
.aurora .b{width:46vw;height:46vw;right:-10vw;top:-8vw;background:radial-gradient(circle,#00d9a3,transparent 62%);animation-delay:-6s}
.aurora .c{width:50vw;height:50vw;left:18vw;bottom:-24vw;background:radial-gradient(circle,#7a2bff,transparent 62%);animation-delay:-12s}
.aurora .d{width:34vw;height:34vw;right:6vw;bottom:-16vw;background:radial-gradient(circle,#ff5d78,transparent 64%);animation-delay:-3s;opacity:.6}
@keyframes drift{33%{transform:translate(6vw,4vh) scale(1.12)}66%{transform:translate(-5vw,-3vh) scale(.92)}}
body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(120% 90% at 50% -10%,transparent 55%,rgba(3,6,14,.85));}

.wrap{max-width:1360px;margin:0 auto;padding:22px;display:flex;flex-direction:column;gap:20px}

/* ---- header ---- */
header{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-weight:900;font-size:20px;
  background:linear-gradient(135deg,var(--acc),var(--buy));color:#04121a;
  box-shadow:0 10px 30px -6px rgba(40,224,164,.5),inset 0 1px 0 rgba(255,255,255,.4);animation:bob 5s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-4px) rotate(-2deg)}}
.brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.4px}
.brand .sub{color:var(--mut);font-size:12.5px;font-weight:500}
.hstat{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{font-size:12px;color:var(--mut);padding:8px 13px;border-radius:999px;
  border:1px solid var(--cardhi);background:rgba(10,15,30,.5);backdrop-filter:blur(8px);font-weight:600}
.chip b{color:var(--txt)}
.online{color:var(--ok)}
.pill{display:inline-flex;align-items:center;gap:9px;padding:9px 16px;border-radius:999px;font-weight:800;font-size:13px;
  border:1px solid var(--cardhi);background:rgba(10,15,30,.55);backdrop-filter:blur(8px)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--dim)}
.pill.run{color:var(--buy)} .pill.run .dot{background:var(--buy);animation:beat 1.3s infinite}
.pill.wait{color:var(--acc)} .pill.wait .dot{background:var(--acc);animation:beat 1.3s infinite}
.pill.stop{color:var(--gold)} .pill.stop .dot{background:var(--gold)}
@keyframes beat{0%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* countdown ring */
.ring{position:relative;width:46px;height:46px}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:800;font-variant-numeric:tabular-nums}

/* ---- cards ---- */
.card{position:relative;background:var(--card);border-radius:var(--r);padding:20px;
  backdrop-filter:blur(16px);box-shadow:var(--shadow);border:1px solid transparent;
  background-clip:padding-box}
.card::before{content:"";position:absolute;inset:0;border-radius:var(--r);padding:1px;pointer-events:none;
  background:linear-gradient(150deg,rgba(150,180,255,.35),rgba(150,180,255,.04) 40%,transparent 70%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude}
.card h2{margin:0 0 16px;font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--mut);
  display:flex;align-items:center;gap:8px}
.card h2::before{content:"";width:14px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--acc),transparent)}

.grid{display:grid;gap:20px}
.top{grid-template-columns:minmax(380px,1fr) 1.35fr}
.bottom{grid-template-columns:1fr 1.3fr}
.rightcol{display:grid;gap:20px;grid-template-rows:auto 1fr}
@media(max-width:1040px){.top,.bottom{grid-template-columns:1fr}}

/* ---- form ---- */
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fld{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
input,select{background:rgba(6,10,20,.75);border:1px solid rgba(120,150,220,.16);color:var(--txt);
  border-radius:12px;padding:12px 13px;font-size:14.5px;font-family:inherit;outline:none;transition:.18s;font-variant-numeric:tabular-nums}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(91,140,255,.18),0 0 22px -6px rgba(91,140,255,.5)}
select{cursor:pointer}
.btns{display:flex;gap:12px;margin-top:4px}
button{flex:1;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;
  color:#03121a;font-family:inherit;position:relative;overflow:hidden;transition:transform .12s,box-shadow .2s,filter .2s}
button:active{transform:translateY(1px) scale(.99)}
.start{background:linear-gradient(135deg,var(--buy),var(--buy2));box-shadow:0 12px 30px -10px rgba(40,224,164,.7)}
.start:hover:not(:disabled){box-shadow:0 16px 40px -8px rgba(40,224,164,.9);filter:brightness(1.06)}
.stop{background:linear-gradient(135deg,var(--sell),var(--sell2));box-shadow:0 12px 30px -10px rgba(255,93,120,.6)}
.stop:hover:not(:disabled){box-shadow:0 16px 40px -8px rgba(255,93,120,.85);filter:brightness(1.06)}
.ghost{flex:0 0 auto;padding:14px 20px;background:rgba(91,140,255,.14);color:var(--txt);border:1px solid var(--cardhi)}
.ghost:hover{background:rgba(91,140,255,.24)}
button:disabled{filter:grayscale(.75) brightness(.62);cursor:not-allowed;box-shadow:none}
button .rip{position:absolute;border-radius:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.5);animation:rip .6s ease-out;pointer-events:none}
@keyframes rip{from{width:0;height:0;opacity:.6}to{width:340px;height:340px;opacity:0}}

/* toggle */
.toggle{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.toggle input{display:none}
.toggle .tk{width:46px;height:26px;border-radius:99px;background:rgba(255,255,255,.09);position:relative;transition:.22s;border:1px solid var(--cardhi);flex:none}
.toggle .tk::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#c8d2ee;transition:.22s;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.toggle input:checked + .tk{background:linear-gradient(90deg,var(--acc),var(--buy));box-shadow:0 0 16px -3px rgba(40,224,164,.6)}
.toggle input:checked + .tk::after{left:22px;background:#fff}
.toggle span{font-size:13px;color:var(--txt)}

/* segmented control */
.seg{display:flex;gap:4px;padding:4px;border-radius:12px;background:rgba(6,10,20,.7);border:1px solid rgba(120,150,220,.16)}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:12.5px;font-weight:700;background:transparent;color:var(--mut);box-shadow:none}
.seg button.on{background:linear-gradient(135deg,var(--acc),var(--violet));color:#fff;box-shadow:0 8px 20px -8px rgba(120,90,255,.7)}

.note{font-size:11.5px;line-height:1.6;color:var(--mut);margin-top:4px}
.warn{color:var(--gold)}
.err{color:var(--sell);font-size:11.5px;min-height:14px;margin-top:8px}

/* ---- balances ---- */
.accs{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.accs{grid-template-columns:1fr}}
.acc{position:relative;border-radius:16px;padding:17px;overflow:hidden;
  background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01));border:1px solid var(--cardhi)}
.acc.buyer{box-shadow:inset 0 0 0 1px rgba(40,224,164,.25),0 0 34px -18px rgba(40,224,164,.7)}
.acc.seller{box-shadow:inset 0 0 0 1px rgba(255,93,120,.25),0 0 34px -18px rgba(255,93,120,.7)}
.acc .head{display:flex;justify-content:space-between;align-items:center}
.acc .name{font-weight:800;font-size:16px;letter-spacing:-.2px}
.badge{font-size:10px;font-weight:900;letter-spacing:1.2px;padding:5px 11px;border-radius:999px}
.badge.buyer{background:rgba(40,224,164,.16);color:var(--buy);border:1px solid rgba(40,224,164,.45)}
.badge.seller{background:rgba(255,93,120,.16);color:var(--sell);border:1px solid rgba(255,93,120,.45)}
.asset{margin-top:15px}
.asset .lbl{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--mut);margin-bottom:7px}
.asset .lbl b{font-size:19px;color:var(--txt);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.bar{height:9px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;position:relative}
.bar>i{display:block;height:100%;border-radius:99px;width:0;transition:width .8s cubic-bezier(.2,.85,.25,1);position:relative}
.bar>i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
  transform:translateX(-100%);animation:shine 2.6s ease-in-out infinite}
@keyframes shine{60%,100%{transform:translateX(220%)}}
.unp .bar>i{background:linear-gradient(90deg,var(--acc),var(--acc2))}
.usdt .bar>i{background:linear-gradient(90deg,var(--gold),#ffe6a3)}
.sm{font-size:10.5px;color:var(--dim);margin-top:5px}

/* ---- chart ---- */
.chartwrap{position:relative;flex:1;min-height:220px}
canvas{display:block;width:100%;height:100%;border-radius:12px}
.chartmeta{position:absolute;top:0;left:0;display:flex;gap:14px;font-size:11px;color:var(--mut)}
.chartmeta b{color:var(--txt);font-variant-numeric:tabular-nums}
.legend{position:absolute;top:0;right:0;display:flex;gap:12px;font-size:11px}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* ---- order book ---- */
.book{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.side h3{margin:0 0 10px;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;font-weight:800}
.side.bid h3{color:var(--buy)} .side.ask h3{color:var(--sell)}
.lvl{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0;font-variant-numeric:tabular-nums;
  animation:lvlin .4s ease}
@keyframes lvlin{from{opacity:0;transform:translateX(var(--dir,-8px))}}
.lvl .lb{position:relative;flex:1;height:22px;border-radius:7px;overflow:hidden;background:rgba(255,255,255,.035)}
.lvl .lb>i{position:absolute;top:0;bottom:0;width:0;transition:width .6s cubic-bezier(.2,.85,.25,1)}
.bid .lb>i{right:0;background:linear-gradient(90deg,transparent,rgba(40,224,164,.42))}
.ask .lb>i{left:0;background:linear-gradient(90deg,rgba(255,93,120,.42),transparent)}
.lvl .px{width:66px;font-weight:800}
.bid .px{color:var(--buy);text-align:right} .ask .px{color:var(--sell)}
.lvl .qt{width:46px;color:var(--mut)}
.bid .qt{text-align:left} .ask .qt{text-align:right}
.spread{text-align:center;font-size:11px;color:var(--mut);margin-top:12px;padding-top:10px;border-top:1px dashed rgba(120,150,220,.18)}
.spread b{color:var(--gold);font-variant-numeric:tabular-nums}

/* ---- stats + table ---- */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:16px}
@media(max-width:640px){.stats{grid-template-columns:repeat(3,1fr)}}
.stat{border-radius:13px;padding:13px;background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01));
  border:1px solid var(--cardhi);text-align:center}
.stat b{display:block;font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.stat span{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px}
.stat.buys b{color:var(--buy)} .stat.sells b{color:var(--sell)} .stat.filled b{color:var(--buy)}
.stat.open b{color:var(--acc)} .stat.rej b{color:var(--sell)}
.tbl{max-height:340px;overflow:auto;border-radius:13px;border:1px solid rgba(120,150,220,.14)}
.tbl::-webkit-scrollbar{width:8px}.tbl::-webkit-scrollbar-thumb{background:rgba(120,150,220,.25);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:10px 13px;text-align:left;white-space:nowrap;font-variant-numeric:tabular-nums}
th{position:sticky;top:0;background:rgba(14,20,38,.96);backdrop-filter:blur(6px);color:var(--mut);
  font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;z-index:1}
tbody tr{border-top:1px solid rgba(120,150,220,.1);animation:rowin .4s cubic-bezier(.2,.85,.25,1)}
@keyframes rowin{from{opacity:0;transform:translateY(-7px)}}
.tag{font-weight:800;padding:3px 10px;border-radius:999px;font-size:11px}
.tag.BUY{color:var(--buy);background:rgba(40,224,164,.14)}
.tag.SELL{color:var(--sell);background:rgba(255,93,120,.14)}
.st{font-weight:700;font-size:11.5px}
.st.open{color:var(--acc)} .st.filled{color:var(--buy)} .st.cancelled{color:var(--dim)}
.st.rejected,.st.cancel_failed{color:var(--sell)}
.flash{animation:flash 1s ease}
@keyframes flash{from{background:rgba(91,140,255,.28)}}
.empty{color:var(--dim);font-size:12.5px;padding:14px;text-align:center}
</style>
</head>
<body>
<div class="aurora"><span class="a"></span><span class="b"></span><span class="c"></span><span class="d"></span></div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">E</div>
      <div><h1>Exuno</h1><div class="sub">UNPUSDT · order-book training panel</div></div>
    </div>
    <div class="hstat">
      <span class="chip" id="health">health <b class="online">●</b></span>
      <span class="chip">round <b id="round">0</b></span>
      <div class="ring" id="ring" title="round / candle progress">
        <svg width="46" height="46"><circle cx="23" cy="23" r="19" stroke="rgba(255,255,255,.08)" stroke-width="4" fill="none"/>
        <circle id="ringArc" cx="23" cy="23" r="19" stroke="url(#rg)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#28e0a4"/></linearGradient></defs></svg>
        <div class="val" id="ringVal">–</div>
      </div>
      <span class="pill" id="status"><span class="dot"></span><span id="statusTxt">idle</span></span>
    </div>
  </header>

  <div class="grid top">
    <!-- CONFIG -->
    <div class="card">
      <h2>Configuration</h2>
      <div class="row">
        <div class="fld"><label>Low value</label><input id="low" value="0.10000"></div>
        <div class="fld"><label>High value</label><input id="high" value="0.11000"></div>
      </div>
      <div class="row">
        <div class="fld"><label>Count (values)</label><input id="count" type="number" min="1" max="200" value="10"></div>
        <div class="fld"><label>Quantity / order</label><input id="quantity" value="20"></div>
      </div>
      <div class="fld">
        <label>Auto count</label>
        <label class="toggle"><input type="checkbox" id="auto_count"><span class="tk"></span>
          <span>Random each round, scaled to total UNP + USDT</span></label>
        <div class="note" id="countNote"></div>
      </div>
      <div class="row">
        <div class="fld"><label>Buy discount (after N)</label><input id="discount" value="0.005"></div>
        <div class="fld"><label>Same-price count (N)</label><input id="same_count" type="number" min="0" value="3"></div>
      </div>
      <div class="row">
        <div class="fld"><label>Expire / order (s)</label><input id="expire" type="number" min="5" value="60"></div>
        <div class="fld"><label>Round window (s)</label><input id="window" type="number" min="5" value="60"></div>
      </div>
      <div class="fld">
        <label>Candle sync</label>
        <label class="toggle"><input type="checkbox" id="align_candle" checked><span class="tk"></span>
          <span>Wait for next 1M candle open</span></label>
      </div>
      <div class="fld">
        <label>Role mode</label>
        <div class="seg" id="modeSeg">
          <button data-v="auto" class="on">Auto · by balances</button>
          <button data-v="manual">Manual</button>
        </div>
      </div>
      <div class="fld" id="manualRoles" style="display:none">
        <label>Buyer / Seller</label>
        <div style="display:flex;gap:10px">
          <select id="buyer"><option value="1">Buy: acct 1</option><option value="2" selected>Buy: acct 2</option></select>
          <select id="seller"><option value="1" selected>Sell: acct 1</option><option value="2">Sell: acct 2</option></select>
        </div>
      </div>
      <div class="btns">
        <button class="ghost" id="saveBtn">Save</button>
        <button class="start" id="startBtn">▶ Start</button>
        <button class="stop" id="stopBtn" disabled>■ Stop</button>
      </div>
      <div class="err" id="err"></div>
      <div class="note" id="pacing"></div>
      <div class="note" id="fillNote"></div>
    </div>

    <!-- RIGHT: balances + chart -->
    <div class="rightcol">
      <div class="card">
        <h2>Live balances</h2>
        <div class="accs" id="accs"></div>
      </div>
      <div class="card" style="display:flex;flex-direction:column">
        <h2>Live activity · price of every order</h2>
        <div class="legend"><span><i style="background:var(--buy)"></i>buy</span><span><i style="background:var(--sell)"></i>sell</span></div>
        <div class="chartwrap"><canvas id="chart"></canvas></div>
      </div>
    </div>
  </div>

  <div class="grid bottom">
    <div class="card">
      <h2>Open order book · live</h2>
      <div class="book">
        <div class="side bid"><h3>Bids · buy</h3><div id="bids"></div></div>
        <div class="side ask"><h3>Asks · sell</h3><div id="asks"></div></div>
      </div>
      <div class="spread" id="spread"></div>
    </div>
    <div class="card">
      <h2>Orders · who bought / who sold</h2>
      <div class="stats" id="stats"></div>
      <div class="tbl">
        <table><thead><tr><th>#</th><th>Time</th><th>R</th><th>Side</th><th>Acct</th><th>Price</th><th>Qty</th><th>Status</th></tr></thead>
        <tbody id="rows"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const api=(p,m,b)=>fetch(p,{method:m||'GET',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined}).then(r=>r.json());
const fmt=(n,d=5)=>Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
let seenSeq=0, mode='auto', lastState=null, maxBal={UNP:600,USDT:100};

/* ripple on buttons */
document.querySelectorAll('button').forEach(b=>b.addEventListener('click',e=>{
  if(b.disabled)return; const r=document.createElement('span');r.className='rip';
  const rc=b.getBoundingClientRect();r.style.left=(e.clientX-rc.left)+'px';r.style.top=(e.clientY-rc.top)+'px';
  b.appendChild(r);setTimeout(()=>r.remove(),600);
}));

/* mode segmented control */
$('#modeSeg').querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
  mode=btn.dataset.v;$('#modeSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));
  $('#manualRoles').style.display=mode==='manual'?'flex':'none';pacing(readCfg());
});

function readCfg(){return{
  low:$('#low').value.trim(),high:$('#high').value.trim(),count:+$('#count').value,quantity:$('#quantity').value.trim(),
  auto_count:$('#auto_count').checked,
  discount:$('#discount').value.trim(),same_count:+$('#same_count').value,expire:+$('#expire').value,window:+$('#window').value,
  align_candle:$('#align_candle').checked,mode,buyer:+$('#buyer').value,seller:+$('#seller').value};}

['low','high','discount','count','same_count','expire','window','align_candle','auto_count','quantity'].forEach(id=>{
  const el=document.getElementById(id);['input','change'].forEach(ev=>el.addEventListener(ev,()=>pacing(readCfg())));});

function capacityEst(c){
  const accs=lastState?.balances?.accounts||{};
  const f=(n,a)=>+((accs[n]?.assets?.[a]?.free)||0);
  const tUNP=f('1','UNP')+f('2','UNP'), tUSDT=f('1','USDT')+f('2','USDT');
  const qty=+c.quantity, mid=((+c.low)+(+c.high))/2;
  const cap=(qty>0&&mid>0)?Math.floor(Math.min(tUNP/qty, tUSDT/(mid*qty))):0;
  return {cap,tUNP,tUSDT};
}

async function save(){const c=readCfg();await api('/api/config','POST',c);pacing(c);$('#err').textContent='';}
$('#saveBtn').onclick=save;
$('#startBtn').onclick=async()=>{await save();await api('/api/start','POST');};
$('#stopBtn').onclick=()=>api('/api/stop','POST');

function pacing(c){
  // Auto-count: disable manual field, show capacity + the last picked count.
  $('#count').disabled=c.auto_count;
  $('#count').style.opacity=c.auto_count?.45:1;
  const cn=$('#countNote');
  if(c.auto_count){
    const {cap,tUNP,tUSDT}=capacityEst(c), upper=Math.max(1,Math.min(cap,60));
    const picked=(lastState?.running&&lastState?.auto_count_value)?` · this round: ${lastState.auto_count_value}`:'';
    cn.className='note';
    cn.textContent=`Random 1–${upper} pairs/round · capacity ≈ ${cap} (total UNP ${fmt(tUNP,2)}, USDT ${fmt(tUSDT,2)})${picked}`;
  } else cn.textContent='';
  const cShown=c.auto_count?'auto':c.count, iv=c.window/Math.max(c.auto_count?10:c.count,1);
  $('#pacing').textContent=`${cShown} pairs/round · ~one every ${iv.toFixed(2)}s · expires ${c.expire}s`
    +(c.align_candle?' · synced to 1M candle':'')+' · loops until Stop';
  const span=Math.abs((+c.high)-(+c.low)),d=+c.discount,minSafe=span/2,safe=d>=minSafe&&d>0;
  const f=$('#fillNote');f.className='note'+(safe?'':' warn');
  f.textContent=`Fills: first ${c.same_count} cross → FILL · after ${c.same_count} rest (bid −${d}, ask +${d}) → no fill`
    +(safe?' ✓':`  ⚠ discount ${d} < ${minSafe.toFixed(5)} (½ range); raise to ≥ ${minSafe.toFixed(5)} so the rest never cross`);
}

/* number count-up */
const numState=new WeakMap();
function animNum(el,to,dec){
  const from=numState.get(el)??to;if(from===to){el.textContent=fmt(to,dec);numState.set(el,to);return;}
  const t0=performance.now(),dur=650;
  function step(t){const k=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-k,3);const v=from+(to-from)*e;
    el.textContent=fmt(v,dec);if(k<1)requestAnimationFrame(step);else numState.set(el,to);}
  requestAnimationFrame(step);numState.set(el,to);
}

function balances(s){
  const accs=s.balances?.accounts||{},roles=s.roles||{};
  [1,2].forEach(n=>{
    const a=accs[String(n)]?.assets||{};const unp=+(a.UNP?.free||0),usdt=+(a.USDT?.free||0);
    maxBal.UNP=Math.max(maxBal.UNP,unp*1.08);maxBal.USDT=Math.max(maxBal.USDT,usdt*1.08);
  });
  const html=[1,2].map(n=>{
    const a=accs[String(n)]?.assets||{};const unp=+(a.UNP?.free||0),usdt=+(a.USDT?.free||0);
    const lu=+(a.UNP?.locked||0),ld=+(a.USDT?.locked||0);
    const role=roles.buyer===n?'buyer':roles.seller===n?'seller':'';
    const badge=role?`<span class="badge ${role}">${role.toUpperCase()}</span>`:'';
    return `<div class="acc ${role}">
      <div class="head"><span class="name">Account ${n}</span>${badge}</div>
      <div class="asset unp"><div class="lbl"><span>UNP</span><b data-a="${n}u" data-v="${unp}"></b></div>
        <div class="bar"><i style="width:${Math.min(100,unp/maxBal.UNP*100)}%"></i></div><div class="sm">locked ${fmt(lu,2)}</div></div>
      <div class="asset usdt"><div class="lbl"><span>USDT</span><b data-a="${n}d" data-v="${usdt}"></b></div>
        <div class="bar"><i style="width:${Math.min(100,usdt/maxBal.USDT*100)}%"></i></div><div class="sm">locked ${fmt(ld,2)}</div></div>
    </div>`;
  }).join('');
  const cur=$('#accs').dataset.k||'';
  const key=[1,2].map(n=>roles.buyer===n?'b':roles.seller===n?'s':'-').join('');
  if(cur!==key){$('#accs').innerHTML=html;$('#accs').dataset.k=key;}
  else{ // patch in place to keep count-up smooth
    [1,2].forEach(n=>{const a=accs[String(n)]?.assets||{};
      const bu=$(`#accs [data-a="${n}u"]`),bd=$(`#accs [data-a="${n}d"]`);
      const unp=+(a.UNP?.free||0),usdt=+(a.USDT?.free||0);
      if(bu){animNum(bu,unp,2);bu.closest('.asset').querySelector('.bar>i').style.width=Math.min(100,unp/maxBal.UNP*100)+'%';}
      if(bd){animNum(bd,usdt,2);bd.closest('.asset').querySelector('.bar>i').style.width=Math.min(100,usdt/maxBal.USDT*100)+'%';}});
    return;
  }
  [1,2].forEach(n=>{const a=accs[String(n)]?.assets||{};
    animNum($(`#accs [data-a="${n}u"]`),+(a.UNP?.free||0),2);animNum($(`#accs [data-a="${n}d"]`),+(a.USDT?.free||0),2);});
}

function book(orders){
  const open=orders.filter(o=>o.status==='open');
  const agg=side=>{const m={};open.filter(o=>o.side===side).forEach(o=>m[o.price]=(m[o.price]||0)+ +o.quantity);
    return Object.entries(m).map(([px,qt])=>({px:+px,qt}));};
  const bids=agg('BUY').sort((a,b)=>b.px-a.px).slice(0,8),asks=agg('SELL').sort((a,b)=>a.px-b.px).slice(0,8);
  const mq=Math.max(1,...bids.map(x=>x.qt),...asks.map(x=>x.qt));
  const rw=(x,d)=>`<div class="lvl" style="--dir:${d}"><span class="px">${fmt(x.px,5)}</span>
    <span class="lb"><i style="width:${x.qt/mq*100}%"></i></span><span class="qt">${fmt(x.qt,0)}</span></div>`;
  $('#bids').innerHTML=bids.map(x=>rw(x,'-8px')).join('')||'<div class="empty">no open bids</div>';
  $('#asks').innerHTML=asks.map(x=>rw(x,'8px')).join('')||'<div class="empty">no open asks</div>';
  if(bids.length&&asks.length){const sp=asks[0].px-bids[0].px,mid=(asks[0].px+bids[0].px)/2;
    $('#spread').innerHTML=`mid <b>${fmt(mid,5)}</b> · spread <b>${fmt(sp,5)}</b>`;}
  else $('#spread').innerHTML='waiting for open orders…';
}

const cells=[['buys','Buys',o=>o.side==='BUY'],['sells','Sells',o=>o.side==='SELL'],['open','Open',o=>o.status==='open'],
  ['filled','Filled',o=>o.status==='filled'],['','Cancelled',o=>o.status==='cancelled'],['rej','Rejected',o=>o.status==='rejected'||o.status==='cancel_failed']];
function stats(orders){
  $('#stats').innerHTML=cells.map(([c,l,f])=>`<div class="stat ${c}"><b data-s="${l}">0</b><span>${l}</span></div>`).join('');
  cells.forEach(([c,l,f])=>animNum($(`#stats [data-s="${l}"]`),orders.filter(f).length,0));
}
let statsBuilt=false;
function statsPatch(orders){
  if(!statsBuilt){stats(orders);statsBuilt=true;return;}
  cells.forEach(([c,l,f])=>{const el=$(`#stats [data-s="${l}"]`);if(el)animNum(el,orders.filter(f).length,0);});
}

function rows(orders){
  const list=orders.slice(-140).reverse(),b=$('#rows');
  if(!list.length){b.innerHTML='<tr><td colspan="8" class="empty">no orders yet — press Start</td></tr>';return;}
  b.innerHTML=list.map(o=>{const t=new Date(o.ts*1000).toLocaleTimeString();
    return `<tr class="${o.seq>seenSeq?'flash':''}"><td>${o.seq}</td><td>${t}</td><td>${o.round}</td>
      <td><span class="tag ${o.side}">${o.side}</span></td><td>#${o.account}</td><td>${fmt(o.price,5)}</td>
      <td>${fmt(o.quantity,2)}</td><td class="st ${o.status}">${o.status}${o.error?' · '+String(o.error).slice(0,18):''}</td></tr>`;}).join('');
  seenSeq=orders.reduce((m,o)=>Math.max(m,o.seq),seenSeq);
}

/* ---------- live activity canvas chart ---------- */
const cv=$('#chart'),cx=cv.getContext('2d');
function drawChart(){
  const w=cv.clientWidth,h=cv.clientHeight,dpr=window.devicePixelRatio||1;
  if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
  cx.setTransform(dpr,0,0,dpr,0,0);cx.clearRect(0,0,w,h);
  const os=(lastState?.orders||[]).filter(o=>+o.price>0);
  const pad={l:8,r:56,t:16,b:10};
  // grid
  cx.strokeStyle='rgba(120,150,220,.09)';cx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+(h-pad.t-pad.b)*i/4;cx.beginPath();cx.moveTo(pad.l,y);cx.lineTo(w-pad.r,y);cx.stroke();}
  if(os.length<1){cx.fillStyle='rgba(140,151,186,.5)';cx.font='12px Inter,sans-serif';cx.textAlign='center';
    cx.fillText('order prices will stream here once running',w/2,h/2);return;}
  const prices=os.map(o=>+o.price),lo=Math.min(...prices),hi=Math.max(...prices),sp=(hi-lo)||hi*0.001||1;
  const n=os.length,x=i=>pad.l+(w-pad.l-pad.r)*(n<2?.5:i/(n-1)),y=p=>pad.t+(h-pad.t-pad.b)*(1-(p-lo)/sp);
  // area under a smoothed mid line
  cx.beginPath();os.forEach((o,i)=>{const px=x(i),py=y(+o.price);i?cx.lineTo(px,py):cx.moveTo(px,py);});
  const grad=cx.createLinearGradient(0,pad.t,0,h-pad.b);grad.addColorStop(0,'rgba(91,140,255,.28)');grad.addColorStop(1,'rgba(91,140,255,0)');
  cx.lineTo(x(n-1),h-pad.b);cx.lineTo(x(0),h-pad.b);cx.closePath();cx.fillStyle=grad;cx.fill();
  // connecting line
  cx.beginPath();os.forEach((o,i)=>{const px=x(i),py=y(+o.price);i?cx.lineTo(px,py):cx.moveTo(px,py);});
  cx.strokeStyle='rgba(157,184,255,.55)';cx.lineWidth=1.5;cx.stroke();
  // dots (last ~80)
  const start=Math.max(0,n-80);
  for(let i=start;i<n;i++){const o=os[i],px=x(i),py=y(+o.price),buy=o.side==='BUY';
    cx.beginPath();cx.arc(px,py,i===n-1?4.5:3,0,7);cx.fillStyle=buy?'#28e0a4':'#ff5d78';
    if(i===n-1){cx.shadowBlur=14;cx.shadowColor=buy?'#28e0a4':'#ff5d78';}cx.fill();cx.shadowBlur=0;}
  // last price label
  const lastP=+os[n-1].price;cx.fillStyle='#eaf0fb';cx.font='700 12px Inter,sans-serif';cx.textAlign='left';
  cx.fillText(fmt(lastP,5),w-pad.r+6,y(lastP)+4);
  cx.fillStyle='rgba(140,151,186,.8)';cx.font='11px Inter,sans-serif';
  cx.fillText(fmt(hi,5),w-pad.r+6,pad.t+4);cx.fillText(fmt(lo,5),w-pad.r+6,h-pad.b);
}

/* ---------- status + ring ---------- */
const RC=2*Math.PI*19;
function renderStatus(){
  const s=lastState;if(!s)return;const st=$('#status');let cls='',txt='idle',frac=0,ringTxt='–';
  if(s.phase==='waiting'){const rem=Math.max(0,(s.candle_wait_until||0)-Date.now()/1000);
    cls=' wait';txt='next candle '+rem.toFixed(1)+'s';frac=1-rem/60;ringTxt=Math.ceil(rem)+'s';}
  else if(s.running){cls=' run';txt='running';
    const el=(Date.now()/1000)-(s.round_started_at||Date.now()/1000);const win=+(s.config?.window||60);
    frac=Math.min(1,el/win);ringTxt=Math.max(0,Math.ceil(win-el))+'s';}
  else if(s.phase==='stopping'){cls=' stop';txt='stopping';}
  st.className='pill'+cls;$('#statusTxt').textContent=txt;
  $('#ringArc').style.strokeDashoffset=RC*(1-Math.max(0,Math.min(1,frac)));
  $('#ringVal').textContent=ringTxt;
}

async function tick(){
  let s;try{s=await api('/api/state');}catch{return;}
  lastState=s;renderStatus();
  $('#round').textContent=s.round;
  $('#startBtn').disabled=s.running;$('#stopBtn').disabled=!s.running;
  $('#health').innerHTML='health '+(s.balances?.ok!==false?'<b class="online">●</b>':'<b style="color:var(--sell)">●</b>');
  balances(s);book(s.orders||[]);statsPatch(s.orders||[]);rows(s.orders||[]);
  pacing(readCfg());   // refresh capacity estimate + picked auto-count
}
function loop(){renderStatus();drawChart();requestAnimationFrame(loop);}
pacing(readCfg());tick();setInterval(tick,1500);requestAnimationFrame(loop);
</script>
